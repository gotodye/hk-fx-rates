<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>香港同業匯率監控</title>
<style>
  :root{
    --bg:#F4F7F6; --card:rgba(255,255,255,0.75); --card-solid:rgba(255,255,255,0.55);
    --primary:#88D8C0; --primary-deep:#4FC0A4; --secondary:#7A8AF1;
    --ink:#1E293B; --body:#475569; --muted:#94A3B8;
    --up:#3FB99A; --down:#E8837A; --amber:#E9A85C;
    --radius-lg:20px; --radius-sm:12px;
    --shadow-out:6px 6px 16px rgba(163,177,198,0.35), -6px -6px 16px rgba(255,255,255,0.8);
    --shadow-in:inset 2px 2px 5px rgba(163,177,198,0.25), inset -2px -2px 5px rgba(255,255,255,0.75);
    --ease:cubic-bezier(0.4,0,0.2,1);
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:0 0 40px;font:15px/1.55 "Inter",system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    background:var(--bg);color:var(--body);-webkit-font-smoothing:antialiased;}
  a{color:var(--secondary);}
  header{margin:22px auto 6px;max-width:1120px;padding:20px 26px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.6);border-radius:var(--radius-lg);box-shadow:var(--shadow-out);}
  header .brand{display:flex;flex-direction:column;gap:2px;margin-right:auto;}
  header h1{font-size:19px;margin:0;color:var(--ink);font-weight:700;}
  header .sub{font-size:12.5px;color:var(--muted);}
  main{padding:18px 24px 0;max-width:1120px;margin:0 auto;}
  .grid{display:grid;gap:20px;}
  .card{background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.6);border-radius:var(--radius-lg);box-shadow:var(--shadow-out);padding:22px 24px;}
  h2{font-size:15.5px;margin:0 0 16px;color:var(--ink);font-weight:700;display:flex;align-items:center;gap:10px;}
  h2 .tag{font-size:12px;font-weight:600;color:var(--primary-deep);background:rgba(136,216,192,0.18);padding:3px 10px;border-radius:20px;}
  .overflow{overflow-x:auto;}
  table{width:100%;border-collapse:separate;border-spacing:0 8px;}
  th{text-align:left;padding:4px 14px;color:var(--muted);font-weight:600;font-size:12.5px;text-transform:uppercase;letter-spacing:.03em;}
  td{padding:13px 14px;background:var(--card-solid);vertical-align:middle;
    border-top:1px solid rgba(255,255,255,0.5);border-bottom:1px solid rgba(163,177,198,0.10);}
  tr td:first-child{border-radius:var(--radius-sm) 0 0 var(--radius-sm);border-left:1px solid rgba(255,255,255,0.5);}
  tr td:last-child{border-radius:0 var(--radius-sm) var(--radius-sm) 0;border-right:1px solid rgba(163,177,198,0.10);}
  tbody tr{transition:all .25s var(--ease);}
  tbody tr:hover td{background:rgba(255,255,255,0.9);}
  td.name{color:var(--ink);font-weight:600;}
  td.rate{font-variant-numeric:tabular-nums;font-weight:700;color:var(--ink);font-size:15.5px;}
  tr.best td{background:rgba(136,216,192,0.20);}
  tr.best td:first-child{box-shadow:inset 4px 0 0 var(--primary-deep);}
  tr.best td.rate{color:var(--primary-deep);}
  tr.best td.name .star{color:var(--primary-deep);margin-left:6px;font-size:12px;}
  .pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(148,163,184,0.15);color:var(--muted);white-space:nowrap;}
  .pill.web{color:var(--primary-deep);background:rgba(136,216,192,0.20);}
  .pill.fb_ocr{color:var(--secondary);background:rgba(122,138,241,0.15);}
  .pill.manual{color:#8a7fd6;background:rgba(122,138,241,0.12);}
  .lowconf{color:var(--down);font-size:12px;font-weight:600;background:rgba(232,131,122,0.14);padding:2px 8px;border-radius:12px;}
  .muted{color:var(--muted);font-size:13px;}
  .chart-tabs{display:flex;gap:10px;margin-bottom:14px;}
  .chart-tabs button{background:var(--card-solid);border:1px solid rgba(255,255,255,0.6);color:var(--body);
    border-radius:var(--radius-sm);padding:7px 16px;cursor:pointer;font-size:13px;font-weight:600;
    box-shadow:3px 3px 8px rgba(163,177,198,0.20), -3px -3px 8px rgba(255,255,255,0.7);transition:all .25s var(--ease);}
  .chart-tabs button.active{color:#fff;background:linear-gradient(135deg,#8FDCC6,var(--primary-deep));box-shadow:inset 1px 1px 3px rgba(79,192,164,0.3);}
  svg#chart{width:100%;height:270px;display:block;}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:12.5px;color:var(--body);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
  h3.group-head{font-size:14px;margin:18px 0 8px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;}
  h3.group-head:first-of-type{margin-top:4px;}
  h3.group-head .cnt{font-size:12px;font-weight:600;color:var(--muted);background:rgba(148,163,184,0.14);padding:2px 9px;border-radius:20px;}
  .up{color:var(--up);font-weight:700;}
  .down{color:var(--down);font-weight:700;}
  .edit-form{display:flex;flex-direction:column;gap:14px;}
  .edit-row{display:flex;gap:14px;flex-wrap:wrap;align-items:end;}
  .edit-form label{display:flex;flex-direction:column;font-size:12px;color:var(--muted);gap:5px;font-weight:600;}
  .edit-form input{background:#fff;color:var(--ink);border:1px solid rgba(148,163,184,0.22);
    border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;box-shadow:var(--shadow-in);outline:none;min-width:150px;}
  .edit-form input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(136,216,192,0.35);}
  #saveStatus{font-size:13px;}
  .manual-block{padding:12px 0;border-top:1px solid rgba(163,177,198,0.14);}
  .manual-block:first-of-type{border-top:0;}
  .mp-name{font-weight:700;color:var(--ink);align-self:center;min-width:120px;}
  .btn.secondary{background:var(--card-solid);color:var(--primary-deep);
    box-shadow:3px 3px 8px rgba(163,177,198,0.20),-3px -3px 8px rgba(255,255,255,0.7);}
  .linkbtn{background:none;border:0;color:var(--secondary);font-size:12px;font-weight:600;
    cursor:pointer;padding:2px 6px;border-radius:8px;transition:all .2s var(--ease);}
  .linkbtn:hover{background:rgba(122,138,241,0.12);}
  .fix-box{margin-top:12px;padding:14px 16px;border-radius:var(--radius-sm);
    background:rgba(122,138,241,0.08);border:1px solid rgba(122,138,241,0.25);}
  .fix-box .edit-row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-top:8px;}
  .fix-box label{display:flex;flex-direction:column;font-size:12px;color:var(--muted);gap:5px;font-weight:600;}
  .fix-box input{background:#fff;color:var(--ink);border:1px solid rgba(148,163,184,0.22);
    border-radius:var(--radius-sm);padding:8px 11px;font-size:14px;box-shadow:var(--shadow-in);outline:none;}
  .fix-box input:disabled{background:rgba(148,163,184,0.12);color:var(--muted);}
  .report-pre{white-space:pre-wrap;background:var(--card-solid);border:1px solid rgba(255,255,255,0.6);
    border-radius:var(--radius-sm);padding:14px 16px;margin:2px 0 0;
    font:13px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--ink);}

  refreshFail:{zh:"❌ 無法觸發更新（權杖需含 hk-fx-monitor 的 Actions 寫入權）",en:"❌ Couldn't trigger refresh (token needs Actions:write on hk-fx-monitor)"},
  refreshSlow:{zh:"⏳ 已觸發，仍在執行中；稍後重新整理即可",en:"⏳ Triggered and still running; reload in a moment"},
  refreshedSame:{zh:"✅ 已更新（匯率無變動）",en:"✅ Updated (no rate change)"},
  nextAuto:{zh:"下次自動更新不早於 ",en:"Next auto update no earlier than "},
  fixTitle:{zh:"修正",en:"Fix"},
  fixHint:{zh:"這個數字抓錯了？填入正確匯率。只要來源仍是錯值就會自動套用；來源真的改價後修正會自動失效。",
    en:"Wrong number? Enter the correct rate. It applies while the source still reports the wrong value, and expires by itself once the source really changes."},
  fixCorrect:{zh:"正確匯率",en:"Correct rate"},
  fixNote:{zh:"備註（選填）",en:"Note (optional)"},
  fixSave:{zh:"送出修正",en:"Submit fix"},
  fixCancel:{zh:"取消",en:"Cancel"},
  fixSaved:{zh:"✅ 修正已送出，套用中…",en:"✅ Fix submitted, applying…"},
  fixLog:{zh:"修正紀錄",en:"Correction log"},
  fixLogHint:{zh:"供除錯：看自動抓取讀錯了什麼、修正是否仍生效。點來源可看原始圖片。",
    en:"For debugging: what the scraper misread and whether the fix is still active. Click the source to view the original image."},
  fixApplied:{zh:"套用中",en:"active"},
  fixExpired:{zh:"已失效（來源已改）",en:"expired (source changed)"},
  fixNone:{zh:"目前沒有修正紀錄。",en:"No corrections recorded."},
  thWrong:{zh:"抓到的錯值",en:"Scraped (wrong)"},
  thCorrect:{zh:"修正為",en:"Corrected to"},
  thStatus:{zh:"狀態",en:"Status"},
  thSource:{zh:"來源",en:"Source"},
};
function L(k){ return (T[k]&&(T[k][LANG]??T[k].zh))??k; }
function loc(){ return LOCALE[LANG]||"zh-HK"; }
function setLang(l){
  LANG=l; localStorage.setItem("fxLang",l);
  const b=document.getElementById("langBtn"); if(b) b.textContent=LANG==="zh"?"EN":"中";
  const h=document.getElementById("hTitle"); if(h) h.textContent=L("title");
  const rb=document.getElementById("refreshBtn"); if(rb) rb.textContent=L("refresh");
  if(rb && !rb.disabled) showNextAuto();   // don't clobber a refresh in progress
  if(DATA) render();
}
(function initLang(){
  const b=document.getElementById("langBtn");
  if(b){ b.textContent=LANG==="zh"?"EN":"中"; b.addEventListener("click",()=>setLang(LANG==="zh"?"en":"zh")); }
  const h=document.getElementById("hTitle"); if(h) h.textContent=L("title");
  const rb=document.getElementById("refreshBtn");
  if(rb){ rb.textContent=L("refresh"); rb.addEventListener("click",refreshNow); }
})();

// ---- Shared: dispatch a workflow, then poll ./data.json until it republishes ----
async function dispatchWorkflow(file, inputs){
  const token=(localStorage.getItem("ghToken")||
    ((document.getElementById("ghToken")||{}).value)||"").trim();
  if(!token) return {ok:false, reason:"no-token"};
  try{
    const r=await fetch(`https://api.github.com/repos/${MONITOR_REPO}/actions/workflows/${file}/dispatches`,{
      method:"POST",
      headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify(inputs?{ref:"main",inputs}:{ref:"main"})
    });
    return {ok:r.status===204, reason:String(r.status)};
  }catch(e){ return {ok:false, reason:e.message}; }
}

async function pollUntilPublished(before, tries=36){
  for(let i=0;i<tries;i++){
    await new Promise(x=>setTimeout(x,5000));
    try{
      const res=await fetch("./data.json?_="+Date.now(),{cache:"no-store"});
      if(!res.ok) continue;
      const fresh=await res.json();
      if(fresh.generated_at && fresh.generated_at!==before){ DATA=fresh; render(); return true; }
    }catch(e){}
  }
  return false;
}

// Every full run stamps last_run.json, even a quiet one — data.json is only
// rewritten when a rate actually moves, so it can't tell "finished, nothing
// changed" from "still running". This can.
async function fetchLastRun(){
  try{
    const r=await fetch("./last_run.json?_="+Date.now(),{cache:"no-store"});
    if(r.ok) return await r.json();
  }catch(e){}
  return null;
}

async function pollRefresh(beforeRun, beforeData, tries=36){
  for(let i=0;i<tries;i++){
    await new Promise(x=>setTimeout(x,5000));
    const lr=await fetchLastRun();
    if(!lr||!lr.at||lr.at===beforeRun) continue;
    LAST_RUN=lr;
    try{
      const res=await fetch("./data.json?_="+Date.now(),{cache:"no-store"});
      if(res.ok){ const fresh=await res.json(); if(fresh.generated_at) DATA=fresh; }
    }catch(e){}
    render(); showNextAuto();
    return {done:true, changed:!!(DATA&&DATA.generated_at!==beforeData)};
  }
  return {done:false};
}

// When idle, the status line doubles as "when will this update by itself".
function showNextAuto(){
  const st=document.getElementById("refreshStatus");
  if(!st) return;
  const nxt=LAST_RUN&&LAST_RUN.next_auto_at?new Date(LAST_RUN.next_auto_at):null;
  st.textContent=(nxt&&nxt>new Date())
    ? L("nextAuto")+nxt.toLocaleTimeString(loc(),{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Taipei"})
    : "";
}

// "Refresh now" — GitHub drops most scheduled runs, but workflow_dispatch always
// fires. force=true also bypasses the cooldown gate, and stamping last_run.json
// pushes the next automatic run a full cooldown out from this manual update.
async function refreshNow(){
  const btn=document.getElementById("refreshBtn");
  const st=document.getElementById("refreshStatus");
  const setS=m=>{ if(st) st.textContent=m; };
  if(btn) btn.disabled=true;
  setS(L("refreshing"));
  const before=(await fetchLastRun())||LAST_RUN;
  const d=await dispatchWorkflow("monitor.yml",{force:"true"});
  if(!d.ok){ setS(L("refreshFail")); if(btn) btn.disabled=false; return; }
  const r=await pollRefresh(before?before.at:null, DATA?DATA.generated_at:null);
  setS(!r.done?L("refreshSlow"):(r.changed?L("refreshed"):L("refreshedSame")));
  if(btn) btn.disabled=false;
}

let DATA=null, LAST_RUN=null;

fetch("./data.json?_="+Date.now()).then(r=>r.json()).then(d=>{DATA=d;render();})
 .catch(e=>{document.getElementById("app").innerHTML=
   `<section class="card"><p class="muted">${L("noData")}</p></section>`;});
fetchLastRun().then(lr=>{ LAST_RUN=lr; showNextAuto(); });

function render(){
  const app=document.getElementById("app");
  const upd=DATA.generated_at?new Date(DATA.generated_at).toLocaleString(loc()):"—";
  document.getElementById("updated").textContent=L("lastChange")+upd;
  let html="";

  for(const [f,t] of DATA.corridors){
    const rows=DATA.providers.filter(p=>p.corridors.some(c=>c[0]===f&&c[1]===t));
    const cells=rows.map(p=>({p,cell:DATA.latest[K(p.key,f,t)]}));
    const rates=cells.filter(x=>x.cell&&x.cell.rate!=null).map(x=>x.cell.rate);
    const best=rates.length?Math.max(...rates):null;
    html+=`<section class="card"><h2>${f} → ${t} <span class="tag">${L("latest")}</span></h2><div class="overflow"><table>`
      +`<thead><tr><th>${L("provider")}</th><th>1 ${f} =</th><th>${L("source")}</th><th>${L("conf")}</th><th>${L("updated")}</th><th></th></tr></thead><tbody>`;
    for(const {p,cell} of cells){
      const isBest=cell&&best!=null&&cell.rate===best;
      const badge=p.auto?"":` <span class="pill manual">${L("manual")}</span>`;
      const star=isBest?'<span class="star">★</span>':"";
      const rate=cell&&cell.rate!=null?fmt(cell.rate):'<span class="muted">—</span>';
      let method='<span class="muted">—</span>';
      if(cell&&cell.method){
        const pill=`<span class="pill ${cell.method}" title="${escA(cell.note||'')}">${esc(METHOD_LABEL[cell.method]||cell.method)}</span>`;
        const src=cell.source_url?`<a href="${esc(cell.source_url)}" target="_blank" rel="noopener">${pill}</a>`:pill;
        const img=cell.raw_ref?` <a href="${esc(cell.raw_ref)}" target="_blank" rel="noopener" title="來源圖片 source image">🖼</a>`:"";
        method=src+img;
      }
      let conf='<span class="muted">—</span>';
      if(cell&&cell.confidence!=null){const pc=Math.round(cell.confidence*100);
        conf=cell.confidence<0.6?`<span class="lowconf">${L("low")} ${pc}%⚠</span>`:`${pc}%`;}
      const ts=cell&&cell.captured_at?new Date(cell.captured_at).toLocaleString(loc(),{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):"—";
      // auto-scraped rows get a "fix" entry point (manual rows are edited below)
      const fixBtn=(p.auto && cell && cell.rate!=null)
        ? `<button class="linkbtn" type="button" data-fix="${K(p.key,f,t)}" data-cur="${cell.rate}">${L("fixTitle")}</button>`
        : "";
      html+=`<tr class="${isBest?'best':''}"><td class="name">${esc(p.name)}${badge}${star}</td>`
        +`<td class="rate">${rate}</td><td>${method}</td><td>${conf}</td>`
        +`<td class="muted">${ts}</td><td>${fixBtn}</td></tr>`;
    }
    html+="</tbody></table></div></section>";
  }

  // history chart
  html+=`<section class="card"><h2>${L("history")}</h2><div class="chart-tabs" id="chartTabs">`
    +DATA.corridors.map((c,i)=>`<button data-f="${c[0]}" data-t="${c[1]}" class="${i===0?'active':''}">${c[0]}→${c[1]}</button>`).join("")
    +`</div><svg id="chart" viewBox="0 0 800 270" preserveAspectRatio="none"></svg><div class="legend" id="legend"></div></section>`;

  // recent changes grouped by provider
  html+=`<section class="card"><h2>${L("recent")} <span class="tag">${L("byProv")}</span></h2>`;
  const changes=DATA.changes||[];
  if(changes.length){
    const byProv={};
    for(const ch of changes){(byProv[ch.provider]=byProv[ch.provider]||[]).push(ch);}
    for(const prov of Object.keys(byProv)){
      const items=byProv[prov];
      html+=`<h3 class="group-head">${esc(prov)} <span class="cnt">${items.length}</span></h3><div class="overflow"><table>`
        +`<thead><tr><th>${L("corridor")}</th><th>${L("oldv")}</th><th>${L("newv")}</th><th>${L("dir")}</th><th>${L("time")}</th></tr></thead><tbody>`;
      for(const ch of items){
        const flag=CCY_FLAG[ch.to_ccy]||"";
        const pillCls=ch.to_ccy==="IDR"?"fb_ocr":(ch.to_ccy==="PHP"?"web":"");
        const dir=ch.old_rate&&ch.new_rate>ch.old_rate?`<span class="up">${L("up")}</span>`
          :(ch.old_rate&&ch.new_rate<ch.old_rate?`<span class="down">${L("down")}</span>`:'<span class="muted">—</span>');
        const ts=ch.changed_at?new Date(ch.changed_at).toLocaleString(loc(),{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):"—";
        html+=`<tr><td><span class="pill ${pillCls}">${flag} ${esc(ch.to_ccy)}</span></td>`
          +`<td class="muted">${fmt(ch.old_rate)}</td><td class="rate">${fmt(ch.new_rate)}</td>`
          +`<td>${dir}</td><td class="muted">${ts}</td></tr>`;
      }
      html+="</tbody></table></div>";
    }
  } else { html+=`<p class="muted">${L("noChanges")}</p>`; }
  html+='</section>';

  html+=manualCardHtml();
  html+=correctionLogHtml();
  html+=reportCardHtml();

  app.innerHTML=html;
  document.querySelectorAll("[data-fix]").forEach(b=>
    b.addEventListener("click",()=>openFixDialog(b.dataset.fix, b.dataset.cur)));
  wireManual();
  const tabs=document.getElementById("chartTabs");
  tabs.addEventListener("click",e=>{
    if(e.target.tagName!=="BUTTON")return;
    tabs.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
    e.target.classList.add("active");
    drawCorridor(e.target.dataset.f,e.target.dataset.t);
  });
  const first=tabs.querySelector("button");
  if(first)drawCorridor(first.dataset.f,first.dataset.t);
}

// ---- Manual-rate editor (writes manual.json to the public repo via GitHub API) ----
const MANUAL_REPO="gotodye/hk-fx-rates";  // dashboard/data repo (no source code)

function b64utf8(s){ return btoa(String.fromCharCode.apply(null,new TextEncoder().encode(s))); }
function b64toUtf8(b64){ try{ return new TextDecoder().decode(Uint8Array.from(atob((b64||"").replace(/\n/g,"")),c=>c.charCodeAt(0))); }catch(e){ return "{}"; } }

// Each manual provider gets its OWN inputs + save button (save independently).
function manualCardHtml(){
  const manual=(DATA.providers||[]).filter(p=>!p.auto);

    }
    blocks+=`<div class="manual-block"><div class="edit-row" style="align-items:end">`

      +`<div class="muted" data-status="${p.key}"></div></div>`;

    +`<div class="edit-form">`

async function ghGetManual(hdr){
  const api=`https://api.github.com/repos/${MANUAL_REPO}/contents/manual.json?ref=main&_=`+Date.now();
  const r=await fetch(api,{headers:hdr,cache:"no-store"});
  if(!r.ok) return {json:{}, sha:undefined};
  const d=await r.json();
  let json={}; try{ json=JSON.parse(b64toUtf8(d.content)); }catch(e){}
  return {json:(json&&typeof json==="object")?json:{}, sha:d.sha};
}

async function saveManualProvider(key){
  const st=document.querySelector(`[data-status="${key}"]`);
  const setS=m=>{ if(st) st.textContent=m; };
  const token=(document.getElementById("ghToken").value||"").trim();
  if(!token){ setS(L("stNeedToken")); return; }
  localStorage.setItem("ghToken",token);
  setS(L("stSaving"));
  const hdr={Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json"};
  const api=`https://api.github.com/repos/${MANUAL_REPO}/contents/manual.json`;
  // collect this provider's field values once
  const updates={};
  document.querySelectorAll(`input[data-mk^="${key}|"]`).forEach(inp=>{
    const parts=inp.dataset.mk.split("|");
    updates[`${parts[1]}->${parts[2]}`]=inp.value.trim()===""?"":Number(inp.value.trim());
  });
  // Re-read the latest sha and PUT; on 409 (stale sha) re-read and retry.
  for(let attempt=0; attempt<4; attempt++){
    let cur; try{ cur=await ghGetManual(hdr); }catch(e){ setS(L("stReadFail")+e.message); return; }
    const manual=cur.json;
    if(!manual._comment) manual._comment="在儀表板『編輯人工匯率』填寫即可。數字 = 1 HKD 換多少當地幣。";
    manual[key]=Object.assign(manual[key]||{}, updates);  // update ONLY this provider; keep others
    const body={message:`update ${key} manual rate via dashboard`,branch:"main",content:b64utf8(JSON.stringify(manual,null,2))};
    if(cur.sha) body.sha=cur.sha;
    try{
      const r=await fetch(api,{method:"PUT",headers:{...hdr,"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(r.ok){ await applyManualNow(key, updates); return; }
      if(r.status===409 && attempt<3){ await new Promise(x=>setTimeout(x,700)); continue; }  // stale sha → retry
      setS(`${L("stFail")}${r.status} ${(await r.text()).slice(0,120)}`); return;
    }catch(e){ setS(L("stSendFail")+e.message); return; }
  }
}

// After a successful manual save: show the value immediately, trigger the
// lightweight "Apply Manual Rates" workflow (server-side merge + publish, no
// scraping, no Teams notification), then poll until the published data.json
// reflects it — dashboard updates in ~30-60s instead of waiting 30 minutes.
async function applyManualNow(key, updates){
  const setS=m=>{ const el=document.querySelector(`[data-status="${key}"]`); if(el) el.textContent=m; };
  const before=DATA.generated_at;

  // 1) optimistic — the value IS already persisted in manual.json
  const nowIso=new Date().toISOString();
  for(const [pair,val] of Object.entries(updates)){
    if(val===""||val===null||val===undefined) continue;
    const [f,t]=pair.split("->");
    DATA.latest[K(key,f,t)]={rate:Number(val),method:"manual",confidence:1.0,
      note:"manual.json",source_url:null,raw_ref:null,captured_at:nowIso};
  }
  render();
  setS(L("stApplying"));

  // 2) trigger the server-side merge + publish
  const d=await dispatchWorkflow("apply-manual.yml");
  if(!d.ok){ setS(L("stSavedPending")); return; }

  // 3) poll the published data.json until it reflects the change
  const ok=await pollUntilPublished(before, 24);
  setS(ok?L("stApplied"):L("stSavedPending"));
}

async function wireManual(){
  const tokenEl=document.getElementById("ghToken");
  if(tokenEl){ const saved=localStorage.getItem("ghToken"); if(saved) tokenEl.value=saved; }
  try{
    const r=await fetch(`https://raw.githubusercontent.com/${MANUAL_REPO}/main/manual.json?x=`+Date.now());
    if(r.ok){ const cur=await r.json();
      document.querySelectorAll("input[data-mk]").forEach(inp=>{
        const [k,f,t]=inp.dataset.mk.split("|");
        const v=(cur[k]||{})[`${f}->${t}`];
        if(v!==undefined&&v!=="") inp.value=v;
      });
    }
  }catch(e){}
  document.querySelectorAll("[data-save]").forEach(b=>b.addEventListener("click",()=>saveManualProvider(b.dataset.save)));
  wireReport();
}

async function submitFix(key, wrongRate, box){
  const st=box.querySelector("#fixStatus");
  const setS=m=>{ if(st) st.textContent=m; };
  const val=(box.querySelector("#fixVal").value||"").trim();
  if(val==="") { setS("⚠ "+L("fixCorrect")); return; }
  const token=(localStorage.getItem("ghToken")||"").trim();
  if(!token){ setS(L("rpNeedToken")); return; }
  setS(L("stSaving"));

  const hdr={Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json"};
  const api=`https://api.github.com/repos/${MANUAL_REPO}/contents/corrections.json`;
  const entry={wrong_rate:Number(wrongRate), correct_rate:Number(val),
    corrected_at:new Date().toISOString(), note:(box.querySelector("#fixNote").value||"").trim()};

  for(let attempt=0; attempt<4; attempt++){
    let cur={json:{},sha:undefined};
    try{
      const g=await fetch(api+"?ref=main&_="+Date.now(),{headers:hdr,cache:"no-store"});
      if(g.ok){ const d=await g.json();
        try{ cur.json=JSON.parse(b64toUtf8(d.content)); }catch(e){ cur.json={}; }
        cur.sha=d.sha;
      }
    }catch(e){ setS(L("stReadFail")+e.message); return; }

    const doc=(cur.json&&typeof cur.json==="object")?cur.json:{};
    if(!doc._comment) doc._comment="匯率修正：只要來源仍是錯值就自動套用；來源改變後自動失效。";
    doc.corrections=doc.corrections||{};
    doc.corrections[key]=entry;

    const body={message:`fix ${key} rate via dashboard`,branch:"main",
      content:b64utf8(JSON.stringify(doc,null,2))};
    if(cur.sha) body.sha=cur.sha;
    try{
      const r=await fetch(api,{method:"PUT",headers:{...hdr,"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(r.ok){
        setS(L("fixSaved"));
        const before=DATA.generated_at;
        // optimistic: show the corrected number right away
        if(DATA.latest[key]) DATA.latest[key].rate=Number(val);
        render();
        const d=await dispatchWorkflow("apply-manual.yml");
        if(d.ok) await pollUntilPublished(before, 24);
        return;
      }
      if(r.status===409 && attempt<3){ await new Promise(x=>setTimeout(x,700)); continue; }
      setS(`${L("stFail")}${r.status} ${(await r.text()).slice(0,120)}`); return;
    }catch(e){ setS(L("stSendFail")+e.message); return; }
  }
}

// ---- Rate report → triggers the server-side send-report workflow on GitHub ----
const REPORT_TO="HK-ID Remittance";
const MONITOR_REPO="gotodye/hk-fx-monitor";  // private repo hosting send-report.yml

function reportCardHtml(){
  return `<section class="card"><h2>${L("sendReport")} <span class="tag">${L("toKyle")}</span></h2>`
    +`<div class="edit-form">`
    +`<div class="edit-row"><button class="btn secondary" id="previewReport" type="button">${L("preview")}</button>`
    +`<button class="btn" id="sendReport" type="button" style="display:none">${L("send")}</button></div>`
    +`<pre id="reportPreview" class="report-pre" style="display:none"></pre>`
    +`<div id="reportStatus" class="muted"></div>`
    +`<p class="muted" style="margin:6px 0 0">${L("reportHint")}</p>`
    +`</div></section>`;
}

function reportDir(key){
  const h=(DATA.history||{})[key];
  if(!h||h.length<2) return "";
  const cur=h[h.length-1].rate, prev=h[h.length-2].rate;
  return cur>prev?" ▲":cur<prev?" ▼":"";
}

function buildReport(){
  const now=(DATA.generated_at?new Date(DATA.generated_at):new Date()).toLocaleString(loc(),{timeZone:"Asia/Taipei"});
  const NA=L("rNA"), BEST=L("rBest"), SEP=(LANG==="en"?": ":"：");
  const lines=[L("rTitle"),L("rTo")+REPORT_TO,L("rAsOf")+now];
  for(const [f,t] of DATA.corridors){
    lines.push("",`【${f} → ${t}】`);
    const rows=DATA.providers.filter(p=>p.corridors.some(c=>c[0]===f&&c[1]===t))
      .map(p=>({name:p.name,key:K(p.key,f,t),cell:DATA.latest[K(p.key,f,t)]}));
    const rates=rows.filter(x=>x.cell&&x.cell.rate!=null).map(x=>x.cell.rate);
    const best=rates.length?Math.max(...rates):null;
    for(const {name,key,cell} of rows){
      const has=cell&&cell.rate!=null;
      const r=has?Number(cell.rate).toFixed(4):NA;
      const arrow=has?reportDir(key):"";
      const star=(has&&best!=null&&cell.rate===best)?BEST:"";
      lines.push(`• ${name}${SEP}${r}${arrow}${star}`);
    }
  }
  return lines.join("\n");
}

function wireReport(){
  const pv=document.getElementById("previewReport");
  const sd=document.getElementById("sendReport");
  const box=document.getElementById("reportPreview");
  if(pv) pv.addEventListener("click",()=>{
    box.textContent=buildReport(); box.style.display="block";
    if(sd) sd.style.display="inline-flex";
    const s=document.getElementById("reportStatus"); if(s) s.textContent="";
  });
  if(sd) sd.addEventListener("click",sendReport);
}

// Trigger the server-side send-report workflow (webhook lives in a repo Secret).
async function sendReport(){
  const st=document.getElementById("reportStatus");
  const setS=m=>{ if(st) st.textContent=m; };
  const tokEl=document.getElementById("ghToken");
  const token=((tokEl&&tokEl.value.trim())||localStorage.getItem("ghToken")||"").trim();
  if(!token){ setS(L("rpNeedToken")); return; }
  localStorage.setItem("ghToken",token);
  setS(L("rpTriggering"));
  try{
    const r=await fetch(`https://api.github.com/repos/${MONITOR_REPO}/actions/workflows/send-report.yml/dispatches`,{
      method:"POST",
      headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify({ref:"main",inputs:{lang:LANG}})
    });
    if(r.status===204) setS(L("rpDone"));
    else if(r.status===403||r.status===404) setS(`${L("stFail")}${r.status}${L("rpPerm")}`);
    else setS(`${L("stFail")}${r.status} ${(await r.text()).slice(0,120)}`);
  }catch(e){ setS(L("rpTrigFail")+e.message); }
}

function drawCorridor(f,t){
  const series={};
  for(const p of DATA.providers){
    if(!p.corridors.some(c=>c[0]===f&&c[1]===t))continue;
    const h=DATA.history[K(p.key,f,t)];
    if(h&&h.length)series[p.name]=h;
  }
  drawChart(series);
}

function smoothPath(pts){
  if(pts.length<2)return pts.length?`M${pts[0][0]},${pts[0][1]}`:"";
  let d=`M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
    const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
  }
  return d;
}

function drawChart(series){
  const svg=document.getElementById("chart"),legend=document.getElementById("legend");
  svg.innerHTML="";legend.innerHTML="";
  const W=800,H=270,padL=48,padR=16,padT=18,padB=26;
  let all=[];Object.values(series).forEach(pts=>pts.forEach(p=>all.push(p.rate)));
  if(all.length===0){svg.innerHTML='<text x="400" y="135" fill="#94A3B8" text-anchor="middle" font-size="13">尚無歷史資料</text>';return;}
  let min=Math.min(...all),max=Math.max(...all);
  const pad=(max-min)*0.15||1;min-=pad;max+=pad;const span=(max-min)||1;
  let maxLen=0;Object.values(series).forEach(pts=>maxLen=Math.max(maxLen,pts.length));
  const x=i=>padL+(maxLen<=1?(W-padL-padR)/2:i*(W-padL-padR)/(maxLen-1));
  const y=v=>H-padB-((v-min)/span)*(H-padT-padB);
  let defs="<defs>";
  Object.keys(series).forEach((_,ci)=>{const col=COLORS[ci%COLORS.length];
    defs+=`<linearGradient id="g${ci}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity="0.22"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient>`;});
  defs+="</defs>";svg.innerHTML+=defs;
  for(let g=0;g<=3;g++){const gy=padT+g*(H-padT-padB)/3;
    svg.innerHTML+=`<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${W-padR}" y2="${gy.toFixed(1)}" stroke="rgba(148,163,184,0.18)"/>`;
    svg.innerHTML+=`<text x="${padL-8}" y="${(gy+4).toFixed(1)}" fill="#94A3B8" font-size="10.5" text-anchor="end">${(max-g*span/3).toFixed(2)}</text>`;}
  let ci=0;
  for(const [name,pts] of Object.entries(series)){
    const col=COLORS[ci%COLORS.length];
    if(pts.length){
      const P=pts.map((p,i)=>[x(i),y(p.rate)]);
      const line=smoothPath(P);
      const area=line+` L${P[P.length-1][0].toFixed(1)},${H-padB} L${P[0][0].toFixed(1)},${H-padB} Z`;
      svg.innerHTML+=`<path d="${area}" fill="url(#g${ci})"/>`;
      svg.innerHTML+=`<path d="${line}" fill="none" stroke="${col}" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>`;
      const last=P[P.length-1];
      svg.innerHTML+=`<circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3.5" fill="${col}" stroke="#fff" stroke-width="1.5"/>`;
    }
    legend.innerHTML+=`<span><span class="dot" style="background:${col}"></span>${esc(name)}</span>`;
    ci++;
  }
}
</script>
</body>
